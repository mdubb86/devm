[project]
name = "devm-e2e"
version = "0.1.0"
description = "End-to-end tests for devm (pytest + pexpect)"
requires-python = ">=3.14"
dependencies = [
    "pytest>=8.0",
    "pytest-xdist>=3.6",
    "pytest-timeout>=2.3",
    "pexpect>=4.9",
    "pyyaml>=6.0",
]

[tool.pytest.ini_options]
addopts = "-n 0 --durations=20 -ra -v"
timeout = 120
testpaths = ["."]
python_files = "test_*.py"
markers = [
    "devm: drives `devm` as the system under test (test_NN_*.py)",
    "contract: declarative upstream invariant devm depends on; if red, tart or iron-proxy broke something we use (test_tart_contract_NN_*.py, test_iron_contract_NN_*.py)",
    "slow: test involves a long-running operation (e.g. Tart image build); excluded from fast CI passes",
]
