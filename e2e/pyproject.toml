[project]
name = "devm-e2e"
version = "0.1.0"
description = "End-to-end tests for devm (pytest + pexpect)"
requires-python = ">=3.14"
dependencies = [
    "pytest>=8.0",
    "pytest-xdist>=3.6",
    "pytest-timeout>=2.3",
    "pexpect>=4.9",
    "pyyaml>=6.0",
]

[tool.pytest.ini_options]
addopts = "-n 0 --durations=20 -ra -v"
timeout = 120
testpaths = ["."]
python_files = "test_*.py"
markers = [
    "devm: drives `devm` as the system under test (test_NN_*.py)",
    "sbx_contract: declarative invariant devm depends on; if red, sbx broke something we use (test_sbx_contract_NN_*.py)",
    "sbx_tripwire: pins a 'broken' upstream behavior we work around; if red, sbx FIXED something we can simplify (test_sbx_tripwire_NN_*.py)",
    "sbx_interop: pins a Go-primitive ↔ sbx combination devm depends on; drives a Go binary from e2e/probes/ (test_sbx_interop_NN_*.py)",
]
