# .goreleaser.yml — goreleaser v2
# https://goreleaser.com/customization/

version: 2

before:
  hooks:
    # Download the pinned iron-proxy binary and stage it for the archive.
    # IRON_PROXY_VERSION must be set in the CI environment (see release.yml).
    # Default matches the version pinned in justfile.
    - sh -c 'IRON_PROXY_VERSION="${IRON_PROXY_VERSION:-v0.45.0}" && ver="$(echo "$IRON_PROXY_VERSION" | sed "s/^v//")" && mkdir -p share/devm/bin && curl -fsSL -o /tmp/iron-proxy.tar.gz "https://github.com/ironsh/iron-proxy/releases/download/${IRON_PROXY_VERSION}/iron-proxy_${ver}_darwin_arm64.tar.gz" && tar -xzf /tmp/iron-proxy.tar.gz -C share/devm/bin iron-proxy && chmod +x share/devm/bin/iron-proxy && rm /tmp/iron-proxy.tar.gz'

builds:
  - id: devm
    main: ./cmd/devm
    binary: devm
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - share/devm/bin/iron-proxy
      - image/**/*
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: devm
    repository:
      owner: mdubb86
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/mdubb86/devm"
    description: "Developer VM manager"
