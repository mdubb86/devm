# devm base image preseed configuration.
# Reference: https://www.debian.org/releases/stable/example-preseed.txt

### Locale
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string devm-base
d-i netcfg/get_domain string local

### Mirror
d-i mirror/country string US
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Account
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Dev User
d-i passwd/username string dev
d-i passwd/user-password password dev
d-i passwd/user-password-again password dev
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

### Clock and time zone
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

### Partitioning — single disk, no LVM, atomic recipe
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/disk string /dev/vda
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-basicfilesystems/no_swap boolean false

### Bootloader
d-i grub-installer/bootdev string default

### Package selection — minimal install + base infrastructure
tasksel tasksel/first multiselect standard
d-i pkgsel/include string sudo curl ca-certificates dnsmasq caddy systemd-resolved
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none

### Apt
d-i apt-setup/use_mirror boolean true
d-i apt-setup/services-select multiselect security
d-i apt-setup/security_host string security.debian.org

### Sudo: passwordless sudo for the dev user
d-i preseed/late_command string \
    in-target sh -c 'echo "dev ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/dev'; \
    in-target chmod 0440 /etc/sudoers.d/dev; \
    in-target mkdir -p /usr/local/share/devm; \
    in-target curl -fL -o /usr/local/share/devm/firstrun.sh http://192.168.64.1:7901/firstrun.sh; \
    in-target chmod +x /usr/local/share/devm/firstrun.sh; \
    in-target curl -fL -o /etc/systemd/system/devm-ready.target http://192.168.64.1:7901/devm-ready.target; \
    in-target curl -fL -o /etc/systemd/system/devm-dns.service http://192.168.64.1:7901/devm-dns.service; \
    in-target curl -fL -o /etc/systemd/system/devm-caddy.service http://192.168.64.1:7901/devm-caddy.service; \
    in-target cp /usr/local/share/devm/firstrun.sh /etc/devm-firstrun-pending; \
    in-target sh -c 'cat > /etc/systemd/system/devm-firstrun.service <<EOF
[Unit]
Description=devm first-run bake (one-shot)
After=network-online.target
Wants=network-online.target
ConditionPathExists=/etc/devm-firstrun-pending

[Service]
Type=oneshot
ExecStart=/etc/devm-firstrun-pending
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOF'; \
    in-target systemctl enable devm-firstrun.service

### Finish — power off so the build script's poll detects completion.
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/poweroff boolean true
