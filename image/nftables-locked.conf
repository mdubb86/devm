#!/usr/sbin/nft -f
# devm base-image lock. Applied firewall-first by nftables.service on every
# boot. Default-drop egress on OUTPUT and FORWARD (so auto-started containers
# are caged too); allow only loopback, established, the vmnet host gateway
# (tart-guest-agent control channel), and DNS to the local resolver. The daemon
# REPLACES this with the project allowlist during provisioning.
flush ruleset

table inet devm_filter {
  chain output {
    type filter hook output priority 0; policy drop;
    oifname "lo" accept
    ct state established,related accept
    ip daddr 192.168.64.0/24 accept          # vmnet host + gateway (tart agent)
    udp dport 53 accept
    tcp dport 53 accept
  }
  chain forward {
    type filter hook forward priority 0; policy drop;
    ct state established,related accept
  }
}
