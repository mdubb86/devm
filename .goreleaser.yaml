version: 2

project_name: devm

# Fetch the pinned iron-proxy binary so it can be vendored into the
# release archive. IRON_PROXY_VERSION can be overridden via the CI
# environment; default matches the version pinned in justfile.
before:
  hooks:
    - go mod tidy
    - sh -c 'IRON_PROXY_VERSION="${IRON_PROXY_VERSION:-v0.45.0}" && ver="$(echo "$IRON_PROXY_VERSION" | sed "s/^v//")" && mkdir -p share/devm/bin && curl -fsSL -o /tmp/iron-proxy.tar.gz "https://github.com/ironsh/iron-proxy/releases/download/${IRON_PROXY_VERSION}/iron-proxy_${ver}_darwin_arm64.tar.gz" && tar -xzf /tmp/iron-proxy.tar.gz -C share/devm/bin iron-proxy && chmod +x share/devm/bin/iron-proxy && rm /tmp/iron-proxy.tar.gz'
    - sh -c 'mkdir -p internal/docker/embed && GOOS=linux GOARCH=arm64 go build -o internal/docker/embed/devm-runc-shim ./cmd/devm-runc-shim'

builds:
  # Tart requires Apple Silicon; amd64 macOS isn't a supported target.
  # CGO is required: internal/secret bridges to the macOS Security
  # framework for keychain access, and internal/serviceapi/sockact
  # has darwin+cgo files for launchd socket activation. macos-latest
  # CI runners are darwin/arm64 → native cgo, no cross-compile pain.
  - id: devm
    main: ./cmd/devm
    binary: devm
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
      # Random per-build stamp. Both CLI and daemon are compiled from
      # this build so they share the value; drift detection in
      # cmd/devm/main.go's ensureDaemonInSync compares them at
      # command time to catch "binary on disk was rebuilt but the
      # daemon wasn't restarted." Must be injected on every build
      # path (see justfile + e2e/scripts/run.sh for the others).
      - -X main.Fingerprint={{.Env.FINGERPRINT}}

# No explicit `signs:` block: the Go linker auto-applies an ad-hoc
# signature to every darwin/arm64 binary at link time (mandatory on
# Apple Silicon since Big Sur). `codesign -dvv` on the built binary
# shows `flags=0x20002(adhoc,linker-signed)`. That's enough for
# Gatekeeper to treat the binary as "cannot verify developer"
# (right-click → Open dismissable) instead of "unidentified developer".
# An explicit codesign step would be a no-op and is omitted.

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_v{{ .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - share/devm/bin/iron-proxy
      - image/*
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??:.+$'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??:.+$'
      order: 2
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??:.+$'
      order: 3
    - title: Tests
      regexp: '^.*?test(\(.+\))??:.+$'
      order: 4
    - title: Other
      order: 999

release:
  github:
    owner: mdubb86
    name: devm
  draft: false
  prerelease: auto

homebrew_casks:
  - name: devm
    description: "Mac dev sandbox tool (wraps Tart VMs + iron-proxy egress enforcement)"
    homepage: "https://github.com/mdubb86/devm"
    repository:
      owner: mdubb86
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    binaries:
      - devm
    # The binary is ad-hoc signed (no Apple Developer ID). Gatekeeper
    # still flags com.apple.quarantine on cask artifacts; strip the
    # xattr in a postflight hook so first-run doesn't pop the "cannot
    # verify developer" dialog. Standard pattern for OSS CLIs without
    # paid notarization.
    custom_block: |
      postflight do
        system_command "/usr/bin/xattr",
                       args: ["-rd", "com.apple.quarantine", staged_path]
        # If the devm service is installed, restart it so it picks up
        # this newly-installed binary. Best-effort — silent when the
        # service isn't registered (a fresh install) or isn't running.
        system_command "#{HOMEBREW_PREFIX}/bin/devm",
                       args: ["restart"],
                       must_succeed: false
      end
